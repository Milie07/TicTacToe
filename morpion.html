<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Jeu du Tic Tac Toe en HTML, CSS et JS" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Comic+Neue:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&family=Indie+Flower&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="morpion.css" />
    <title>Morpion</title>
  </head>
  <body>
    <h1>Jeu du Morpion</h1>
    
    <div id="choice" class="choice">
      <div class="player1">
        <h2>Joueur 1</h2>
        <select id="playerSelect" aria-label="Sélectionnez un joueur">
          <option value="">Sélectionnez un joueur</option>
          <option id="player1" value="Player">Player</option>
          <option id="ia1-easy" value="IA facile">IA facile</option>
          <option id="ia2-mid" value="IA moyen">IA moyen</option>
          <option id="ia3-hard" value="IA difficile">IA difficile</option>
        </select>
      
        <select id="iconSelect" classe="iconSelect" aria-label="Sélectionner une image pour le joueur 1">
          <option value="">Sélectionnez une image</option>
          <option value="X">X</option>
          <option value="O">O</option>
        </select>
      </div>

      <div class="player2">
        <h2>Joueur 2</h2>
        <select id="playerSelect2" aria-label="Sélectionner une image pour le joueur 2">
          <option value="">Sélectionnez un joueur</option>
          <option id="player2" value="Player">Player</option>
          <option id="ia2-easy" value="IA facile">IA facile</option>
          <option id="ia2-mid" value="IA moyen">IA moyen</option>
          <option id="ia2-hard" value="IA difficile">IA difficile</option>         
        </select>
        <select id="iconSelect2" classe="iconSelect2" aria-label="Sélectionner une image pour le joueur 2">
          <option value="">Sélectionnez une image</option>
          <option value="X">X</option>
          <option value="O">O</option>          
        </select>
      </div>
    </div>
    
    <button
      type="button"
      class="new-game-button"
      id="newGameButton"
      aria-label="Commencer une nouvelle partie"
    >
      Nouvelle partie
    </button>


    <div
      class="game-board"
      id="gameBoard"
      aria-label="Plateau du jeu du morpion"
    ></div>
    <button
      type="reset"
      class="reset-button"
      id="resetButton"
      aria-label="Réinitialiser le jeu"
    >
      Réinitialiser
    </button>
    <div class="game-info" id="gameInfo" aria-live="polite"></div>

    <script src="morpion.js"></script>
  </body>
</html>
